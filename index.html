body{background:#0f0f0f;color:#f0f0f0;font-family:monospace;min-height:100vh}

.ph-btn:hover{color:#f0f0f0}.ph-btn.on{color:#e8ff47;border-bottom-color:#e8ff47}
.wk-nav{padding:.6rem 1.5rem;border-bottom:1px solid #2a2a2a;background:#0f0f0f;position:sticky;top:107px;z-index:30;display:flex;gap:5px;flex-wrap:wrap}

.wk-btn:hover{border-color:#444;color:#f0f0f0}
.wk-btn.on{border-color:#e8ff47;color:#e8ff47;background:rgba(232,255,71,.05)}
.wk-btn.done::after,.wk-btn.partial::after{content:"";position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%}
.wk-btn.done::after{background:#52d68a}.wk-btn.partial::after{background:#ffb830}
.main{padding:1.2rem 1.5rem;max-width:860px}
.wk-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.wk-title{font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:500;letter-spacing:-.03em;line-height:1}
.wk-title .wn{color:#e8ff47}
.wk-dates{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.07em;margin-top:5px}

.done-banner{display:none;background:rgba(82,214,138,.07);border:1px solid rgba(82,214,138,.3);border-radius:8px;padding:12px 16px;text-align:center;margin-bottom:1rem;font-size:13px;color:#52d68a}

.warm-c{color:#fb923c}.cool-c{color:#a78bfa}.bici-c{color:#10b981}

.warm-n{background:rgba(251,146,60,.15);color:#fb923c}
.cool-n{background:rgba(167,139,250,.15);color:#a78bfa}
